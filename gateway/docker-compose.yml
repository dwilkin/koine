services:
  koine-gateway:
    build: .
    container_name: koine-gateway
    restart: unless-stopped
    env_file: .env               # GW_BEARER_TOKEN, ENDPOINT_TOKEN, optional OIDC_*/TELEGRAM_*/per-edge MAILBOX tokens (written by the domain's deploy from its vault, 0600, never committed)
    environment:
      TZ: ${TZ:-UTC}
      GW_BIND: 0.0.0.0:8095
      AGENTS_JSON: /app/agents.json
      STATE_DIR: /data
      MAX_THREAD_DEPTH: "6"
      MAX_MSGS_PER_HOUR: "60"
      COOLDOWN_SECONDS: "0"
      ROUTE_TIMEOUT: "200"
    ports:
      - "8095:8095"
    volumes:
      - koine-gateway-data:/data   # SQLite audit store persists here

  # Cross-domain PEERS reached via a polled mailbox get one poller each. This reference
  # compose ships none — a domain's deploy generates a docker-compose.override.yml with one
  # poller per agents.json entry that has a `mailbox` block. Reference shape:
  #
  #   <name>-poller:
  #     build: .
  #     container_name: <name>-poller
  #     restart: unless-stopped
  #     env_file: .env
  #     environment:
  #       MAILBOX_URL:   https://<host>:8443
  #       MAILBOX_CA:    /app/certs/<name>-mailbox.pem   # omit for a publicly-trusted cert
  #       MAILBOX_TOKEN: ${<NAME>_MAILBOX_TOKEN}
  #       PEER_AGENT:    <name>
  #       GATEWAY_URL:   http://koine-gateway:8095
  #     command: ["python", "-u", "/app/poller.py"]
  #     depends_on: [koine-gateway]

volumes:
  koine-gateway-data:
